version: "3.8"

services:

  postgres:
    image: postgres:14
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: project
      POSTGRES_PASSWORD: project
      POSTGRES_DB: project
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project"]
      interval: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  broker:
    image: confluentinc/cp-kafka:7.4.0
    container_name: broker
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  spark-master:
    image: apache/spark:3.5.2
    container_name: spark-master
    restart: always
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark:/opt/spark/work-dir
      - ./spark_streaming.py:/opt/spark/work-dir/spark_streaming.py

  spark-worker:
    image: apache/spark:3.5.2
    container_name: spark-worker
    restart: always
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./spark:/opt/spark/work-dir
      - ./spark_streaming.py:/opt/spark/work-dir/spark_streaming.py

  airflow-init:
    image: apache/airflow:2.6.0-python3.9
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://project:project@postgres/project
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/usr/app
    entrypoint: >
      bash -c "
      airflow db init &&
      airflow users create
      --username admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com
      --password admin
      "

  airflow-webserver:
    image: apache/airflow:2.6.0-python3.9
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://project:project@postgres/project
    command: webserver
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/usr/app

  airflow-scheduler:
    image: apache/airflow:2.6.0-python3.9
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://project:project@postgres/project
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/usr/app

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: dbt
    restart: always
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app
    entrypoint: ["sleep", "infinity"]

  metabase:
    image: metabase/metabase
    container_name: metabase
    restart: always
    depends_on:
      - postgres
    ports:
      - "3000:3000"

volumes:
  postgres_data: